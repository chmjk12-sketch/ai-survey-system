<head>
  <meta charset="UTF-8">

  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --ink: #1a1a2e;
      --muted: #6b7280;
      --rule: #e5e7eb;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --accent-hover: #4338ca;
      --danger: #ef4444;
      --success: #10b981;
      --success-bg: #ecfdf5;
      --radio-bg: #f0f1f5;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK SC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Progress Bar ===== */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--rule);
      z-index: 100;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 0 2px 2px 0;
    }

    /* ===== Container ===== */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      padding: 2rem 0 2.5rem;
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }
    .header p {
      color: var(--muted);
      font-size: 0.92rem;
      max-width: 520px;
      margin: 0 auto;
    }
    .header .time-badge {
      display: inline-block;
      margin-top: 1rem;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
    }

    /* ===== Section ===== */
    .section {
      margin-bottom: 2rem;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      color: var(--ink);
    }
    .section-title .num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      font-size: 0.82rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .section-desc {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      padding-left: 2.75rem;
    }

    /* ===== Question ===== */
    .question {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }
    .question:hover {
      border-color: #c7d2fe;
    }
    .question.error {
      border-color: var(--danger);
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .question .q-label {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.85rem;
      display: flex;
      align-items: flex-start;
      gap: 0.3rem;
    }
    .question .q-label .required {
      color: var(--danger);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .question .q-hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .question .error-msg {
      font-size: 0.78rem;
      color: var(--danger);
      margin-top: 0.5rem;
      display: none;
    }
    .question.error .error-msg {
      display: block;
    }

    /* ===== Radio Options ===== */
    .radio-group, .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .radio-option, .check-option {
      position: relative;
      cursor: pointer;
      user-select: none;
    }
    .radio-option input, .check-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .radio-option .label, .check-option .label {
      display: inline-block;
      padding: 0.45rem 1rem;
      background: var(--radio-bg);
      border: 1.5px solid transparent;
      border-radius: 8px;
      font-size: 0.88rem;
      color: var(--ink);
      transition: all 0.2s;
    }
    .radio-option .label:hover, .check-option .label:hover {
      background: var(--accent-light);
      border-color: #c7d2fe;
    }
    .radio-option input:checked + .label {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    .check-option input:checked + .label {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ===== Text Input ===== */
    .text-input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--rule);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.2s;
      outline: none;
    }
    .text-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .text-input::placeholder {
      color: #9ca3af;
    }
    textarea.text-input {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    /* ===== Maturity Scale ===== */
    .maturity-options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .maturity-option {
      position: relative;
      cursor: pointer;
      user-select: none;
    }
    .maturity-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .maturity-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1rem;
      background: #fff;
      border: 1.5px solid var(--rule);
      border-radius: 10px;
      transition: all 0.2s;
    }
    .maturity-card:hover {
      border-color: #c7d2fe;
      background: var(--accent-light);
    }
    .maturity-option input:checked ~ .maturity-card {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
    }
    .maturity-badge {
      font-weight: 800;
      font-size: 0.85rem;
      min-width: 36px;
      text-align: center;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      background: var(--radio-bg);
      color: var(--muted);
      transition: all 0.2s;
    }
    .maturity-option input:checked ~ .maturity-card .maturity-badge {
      background: var(--accent);
      color: #fff;
    }
    .maturity-text {
      flex: 1;
    }
    .maturity-text .name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .maturity-text .desc {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ===== Submit ===== */
    .submit-area {
      text-align: center;
      margin-top: 2.5rem;
    }
    .btn-submit {
      display: inline-block;
      padding: 0.85rem 3rem;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(79,70,229,0.3);
    }
    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79,70,229,0.4);
    }
    .btn-submit:active {
      transform: translateY(0);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== Success ===== */
    .success-page {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
    }
    .success-page .icon {
      width: 80px;
      height: 80px;
      background: var(--success-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .success-page .icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--success);
    }
    .success-page h2 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .success-page p {
      color: var(--muted);
      font-size: 0.92rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .container { padding: 1.5rem 1rem 3rem; }
      .header h1 { font-size: 1.35rem; }
      .question { padding: 1rem 1.15rem; }
      .radio-group, .check-group { gap: 0.4rem; }
      .radio-option .label, .check-option .label { font-size: 0.82rem; padding: 0.38rem 0.75rem; }
    }
  </style>
</head>

  /* ===== 获取配置 ===== */
  function fetchConfig() {
    return fetch('/api/form-config')
      .then(function(res) {
        if (!res.ok) throw new Error('API returned ' + res.status);
        return res.json();
      })
      .then(function(data) {
        return data.config;
      })
      .catch(function(err) {
        console.warn('无法从 /api/form-config 加载配置，使用后备配置。', err);
        return FALLBACK_CONFIG;
      });
  }

  /* ===== 渲染头部 ===== */
  function renderHeader(h) {
    formHeader.innerHTML = '';
    var h1 = document.createElement('h1');
    h1.textContent = h.title;
    formHeader.appendChild(h1);

    var p = document.createElement('p');
    p.textContent = h.subtitle;
    formHeader.appendChild(p);

    if (h.badge) {
      var badge = document.createElement('span');
      badge.className = 'time-badge';
      badge.textContent = h.badge;
      formHeader.appendChild(badge);
    }
  }

  /* ===== 构建单个问题 DOM ===== */
  function buildQuestion(q, sectionIndex) {
    var div = document.createElement('div');
    div.className = 'question';
    div.dataset.field = q.field;
    div.dataset.type = q.type;
    if (q.required) div.dataset.required = 'true';

    // 标签
    var labelDiv = document.createElement('div');
    labelDiv.className = 'q-label';
    if (q.required) {
      var star = document.createElement('span');
      star.className = 'required';
      star.textContent = '*';
      labelDiv.appendChild(star);
    }
    labelDiv.appendChild(document.createTextNode(' ' + q.label));
    div.appendChild(labelDiv);

    // 提示
    if (q.hint) {
      var hintDiv = document.createElement('div');
      hintDiv.className = 'q-hint';
      hintDiv.textContent = q.hint;
      div.appendChild(hintDiv);
    }

    // 根据类型构建输入区域
    var nameAttr = q.field;
    switch (q.type) {
      case 'text':
        var input = document.createElement('input');
        input.type = 'text';
        input.name = nameAttr;
        input.className = 'text-input';
        if (q.placeholder) input.placeholder = q.placeholder;
        div.appendChild(input);
        break;

      case 'textarea':
        var textarea = document.createElement('textarea');
        textarea.name = nameAttr;
        textarea.className = 'text-input';
        if (q.placeholder) textarea.placeholder = q.placeholder;
        if (q.rows) textarea.rows = q.rows;
        div.appendChild(textarea);
        break;

      case 'radio':
        var radioGroup = document.createElement('div');
        radioGroup.className = 'radio-group';
        (q.options || []).forEach(function(opt) {
          var label = document.createElement('label');
          label.className = 'radio-option';
          var radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = nameAttr;
          radio.value = opt.value;
          label.appendChild(radio);
          var span = document.createElement('span');
          span.className = 'label';
          span.textContent = opt.label;
          label.appendChild(span);
          radioGroup.appendChild(label);
        });
        div.appendChild(radioGroup);
        break;

      case 'checkbox':
        var checkGroup = document.createElement('div');
        checkGroup.className = 'check-group';
        if (q.max) checkGroup.dataset.max = q.max;
        (q.options || []).forEach(function(opt) {
          var label = document.createElement('label');
          label.className = 'check-option';
          var cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.name = nameAttr;
          cb.value = opt.value;
          label.appendChild(cb);
          var span = document.createElement('span');
          span.className = 'label';
          span.textContent = opt.label;
          label.appendChild(span);
          checkGroup.appendChild(label);
        });
        div.appendChild(checkGroup);
        break;

      case 'maturity':
        var maturityOptions = document.createElement('div');
        maturityOptions.className = 'maturity-options';
        (q.options || []).forEach(function(opt) {
          var label = document.createElement('label');
          label.className = 'maturity-option';
          var radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = nameAttr;
          radio.value = opt.value;
          label.appendChild(radio);

          var card = document.createElement('div');
          card.className = 'maturity-card';

          var badge = document.createElement('div');
          badge.className = 'maturity-badge';
          badge.textContent = opt.value;
          card.appendChild(badge);

          var text = document.createElement('div');
          text.className = 'maturity-text';

          var nameDiv = document.createElement('div');
          nameDiv.className = 'name';
          nameDiv.textContent = opt.name;
          text.appendChild(nameDiv);

          var descDiv = document.createElement('div');
          descDiv.className = 'desc';
          descDiv.textContent = opt.desc;
          text.appendChild(descDiv);

          card.appendChild(text);
          label.appendChild(card);
          maturityOptions.appendChild(label);
        });
        div.appendChild(maturityOptions);
        break;
    }

    // 错误信息
    var errorMsg = document.createElement('div');
    errorMsg.className = 'error-msg';
    errorMsg.textContent = q.required ? ('请' + (q.type === 'radio' || q.type === 'maturity' ? '选择' : (q.type === 'checkbox' ? '至少选择一项' : '填写')) + (q.label.length > 10 ? q.label.substring(0, 10) + '...' : q.label)) : '';
    div.appendChild(errorMsg);

    return div;
  }

  /* ===== 构建整个表单 ===== */
  function buildForm(cfg) {
    config = cfg;
    form.innerHTML = '';

    // 渲染头部
    renderHeader(cfg.header);

    totalSections = cfg.sections.length;

    cfg.sections.forEach(function(sec, idx) {
      var sectionDiv = document.createElement('div');
      sectionDiv.className = 'section';
      sectionDiv.dataset.section = idx + 1;

      // 标题
      var titleDiv = document.createElement('div');
      titleDiv.className = 'section-title';
      var numSpan = document.createElement('span');
      numSpan.className = 'num';
      numSpan.textContent = idx + 1;
      titleDiv.appendChild(numSpan);
      titleDiv.appendChild(document.createTextNode(' ' + sec.title));
      sectionDiv.appendChild(titleDiv);

      // 描述
      if (sec.desc) {
        var descDiv = document.createElement('div');
        descDiv.className = 'section-desc';
        descDiv.textContent = sec.desc;
        sectionDiv.appendChild(descDiv);
      }

      // 问题
      sec.questions.forEach(function(q) {
        sectionDiv.appendChild(buildQuestion(q, idx));
      });

      form.appendChild(sectionDiv);
    });

    // 提交按钮区域
    var submitArea = document.createElement('div');
    submitArea.className = 'submit-area';
    var submitBtn = document.createElement('button');
    submitBtn.type = 'submit';
    submitBtn.className = 'btn-submit';
    submitBtn.id = 'submitBtn';
    submitBtn.textContent = '提交报名表';
    submitArea.appendChild(submitBtn);
    form.appendChild(submitArea);

    // 绑定多选限制事件
    bindMultiSelectLimits();

    // 绑定事件用于进度条
    form.addEventListener('change', updateProgress);
    form.addEventListener('input', updateProgress);
    updateProgress();

    // 绑定提交事件
    form.addEventListener('submit', handleSubmit);
  }

  /* ===== 多选限制 ===== */
  function bindMultiSelectLimits() {
    form.querySelectorAll('.check-group[data-max]').forEach(function(group) {
      var max = parseInt(group.dataset.max);
      group.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', function() {
          var checked = group.querySelectorAll('input[type="checkbox"]:checked');
          if (checked.length > max) {
            cb.checked = false;
            var tip = document.createElement('div');
            tip.textContent = '最多只能选' + max + '项';
            tip.style.cssText = 'font-size:0.78rem;color:#ef4444;margin-top:0.3rem;';
            var existing = group.parentElement.querySelector('.max-tip');
            if (existing) existing.remove();
            tip.className = 'max-tip';
            group.after(tip);
            setTimeout(function() { tip.remove(); }, 2000);
          }
        });
      });
    });
  }

  /* ===== 进度条更新 ===== */
  function updateProgress() {
    var sections = form.querySelectorAll('.section');
    var filled = 0;
    sections.forEach(function(s) {
      var questions = s.querySelectorAll('.question[data-required="true"]');
      var sectionDone = true;
      questions.forEach(function(q) {
        var type = q.dataset.type;
        var filled = false;
        if (type === 'radio' || type === 'maturity') {
          filled = !!q.querySelector('input[type="radio"]:checked');
        } else if (type === 'checkbox') {
          filled = q.querySelectorAll('input[type="checkbox"]:checked').length > 0;
        } else if (type === 'text') {
          var input = q.querySelector('input[type="text"]');
          filled = input && input.value.trim().length > 0;
        } else if (type === 'textarea') {
          var textarea = q.querySelector('textarea');
          filled = textarea && textarea.value.trim().length > 0;
        }
        if (!filled) sectionDone = false;
      });
      if (sectionDone) filled++;
    });
    var pct = totalSections > 0 ? Math.round((filled / totalSections) * 100) : 0;
    progressFill.style.width = pct + '%';
  }

  /* ===== 表单验证 ===== */
  function validate() {
    var valid = true;
    var firstError = null;

    form.querySelectorAll('.question[data-required="true"]').forEach(function(q) {
      q.classList.remove('error');
      var type = q.dataset.type;
      var filled = false;

      if (type === 'radio' || type === 'maturity') {
        filled = !!q.querySelector('input[type="radio"]:checked');
      } else if (type === 'checkbox') {
        filled = q.querySelectorAll('input[type="checkbox"]:checked').length > 0;
      } else if (type === 'text') {
        var input = q.querySelector('input[type="text"]');
        filled = input && input.value.trim().length > 0;
      } else if (type === 'textarea') {
        var textarea = q.querySelector('textarea');
        filled = textarea && textarea.value.trim().length > 0;
      }

      if (!filled) {
        q.classList.add('error');
        valid = false;
        if (!firstError) firstError = q;
      }
    });

    if (firstError) {
      firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    return valid;
  }

  /* ===== 收集数据 ===== */
  function collectData() {
    var data = {};

    // 附加表单头部信息
    if (config && config.header) {
      data.form_title = config.header.title || '';
      data.form_subtitle = config.header.subtitle || '';
    }

    form.querySelectorAll('.question').forEach(function(q) {
      var field = q.dataset.field;
      var type = q.dataset.type;

      if (type === 'radio' || type === 'maturity') {
        var checked = q.querySelector('input[type="radio"]:checked');
        data[field] = checked ? checked.value : null;
      } else if (type === 'checkbox') {
        var checkedAll = q.querySelectorAll('input[type="checkbox"]:checked');
        data[field] = Array.from(checkedAll).map(function(c) { return c.value; });
      } else if (type === 'text') {
        var input = q.querySelector('input[type="text"]');
        data[field] = input ? input.value.trim() || null : null;
      } else if (type === 'textarea') {
        var textarea = q.querySelector('textarea');
        data[field] = textarea ? textarea.value.trim() || null : null;
      }
    });

    return data;
  }

  /* ===== 提交处理 ===== */
  function handleSubmit(e) {
    e.preventDefault();

    if (!validate()) return;

    var submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = '提交中...';

    var data = collectData();

    // 带上用户本地时间
    var now = new Date();
    data.submitted_at = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');

    fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(function(res) { return res.json(); })
    .then(function(result) {
      if (result.success) {
        form.style.display = 'none';
        formHeader.style.display = 'none';
        successPage.style.display = 'block';
        progressFill.style.width = '100%';
      } else {
        alert('提交失败，请稍后重试：' + (result.error || ''));
        submitBtn.disabled = false;
        submitBtn.textContent = '提交报名表';
      }
    })
    .catch(function() {
      alert('网络错误，请检查网络后重试。');
      submitBtn.disabled = false;
      submitBtn.textContent = '提交报名表';
    });
  }

  /* ===== 启动 ===== */
  fetchConfig().then(function(cfg) {
    buildForm(cfg);
  });

})();
</script>

</body>
